<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bridges of Peace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Vazirmatn:wght@400;700&family=Heebo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', 'Heebo', 'Vazirmatn', sans-serif; background: #020617; color: #f8fafc; margin: 0; height: 100vh; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .chat-container { height: calc(100vh - 260px); }
        .rtl { direction: rtl; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .radio-btn-active { background: #2563eb !important; border-color: #60a5fa !important; box-shadow: 0 0 15px rgba(37, 99, 235, 0.4); }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="flex flex-col items-center">

    <!-- Language & Radio Header -->
    <div class="w-full max-lg flex flex-col glass rounded-b-3xl z-50 p-4 gap-3 shadow-2xl">
        <div class="flex justify-around items-center">
            <button onclick="setLang('he')" class="text-[10px] font-bold px-4 py-1.5 bg-white/5 rounded-full border border-white/10">עברית</button>
            <button onclick="setLang('fa')" class="text-[10px] font-bold px-4 py-1.5 bg-white/5 rounded-full border border-white/10">فارسی</button>
            <button onclick="setLang('en')" class="text-[10px] font-bold px-4 py-1.5 bg-white/5 rounded-full border border-white/10">English</button>
        </div>
        
        <div class="flex gap-2">
            <button id="rad-il" onclick="toggleRadio('il')" class="flex-1 bg-white/5 border border-white/10 py-3 rounded-xl text-[10px] font-bold flex flex-col items-center gap-1 transition-all">
                🇮🇱 Mizrahit FM
            </button>
            <button id="rad-ir" onclick="toggleRadio('ir')" class="flex-1 bg-white/5 border border-white/10 py-3 rounded-xl text-[10px] font-bold flex flex-col items-center gap-1 transition-all">
                🇮🇷 Persian Hits
            </button>
            <button onclick="toggleRadio('stop')" class="px-5 bg-red-900/10 border border-red-500/20 rounded-xl">
                <i data-lucide="square" class="w-4 h-4 text-red-500"></i>
            </button>
        </div>
    </div>

    <!-- Hidden Audio Streams -->
    <audio id="player-il" src="https://shaincast.mizrahit.fm/proxy/mizrahit?mp=/stream" crossorigin="anonymous"></audio>
    <audio id="player-ir" src="https://radio.radiojavan.com/high" crossorigin="anonymous"></audio>

    <!-- App Container -->
    <div id="app" class="w-full max-w-md flex-grow flex flex-col glass rounded-t-[2.5rem] overflow-hidden relative mt-2 shadow-2xl border-t border-white/10">
        <header class="p-5 border-b border-white/5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="p-2.5 bg-gradient-to-tr from-blue-600 to-teal-500 rounded-2xl">
                    <i data-lucide="hand-metal" class="w-5 h-5 text-white"></i>
                </div>
                <div>
                    <h1 class="font-bold text-sm tracking-tight" id="ui-title">Bridges of Peace</h1>
                    <p class="text-[9px] opacity-40 uppercase tracking-widest">Shared Hearts • Shelter Edition</p>
                </div>
            </div>
            <i data-lucide="wifi" class="w-4 h-4 text-green-500 opacity-50"></i>
        </header>

        <main id="chat-feed" class="chat-container overflow-y-auto p-5 flex flex-col gap-4 bg-black/40">
            <!-- Messages -->
        </main>

        <footer id="footer-box" class="p-5 bg-slate-900/95 border-t border-white/5 min-h-[110px] flex flex-col justify-center">
            <!-- Buttons -->
        </footer>
    </div>

    <!-- AI Overlay -->
    <div id="ai-loader" class="fixed inset-0 bg-black/95 z-[100] hidden flex flex-col items-center justify-center p-12 text-center">
        <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-6"></div>
        <p class="text-xs font-bold tracking-[0.3em] uppercase opacity-60">Visualizing Peace...</p>
    </div>

    <script type="module">
        const GEMINI_API_KEY = "AIzaSyAfrb24MhbJI7JujcmNvInjNbNhKCnKjn4";

        const i18n = {
            en: { welcome: "Hello dear normal and peace-loving person, are you Persian or Israeli?", per: "I am Persian", isr: "I am Israeli", msgPer: "Awesome! Israelis support your freedom. We are with you!", msgIsr: "Shalom! Persians hold deep respect for Israeli friends.", trivia: "Test our bond with trivia!", score: "Peace Score", input: "Write a message to share...", send: "Share", correct: "✅ Brilliant!", wrong: "❌ Answer: ", finish: "We are one humanity. Share your message of peace with the world!" },
            he: { welcome: "שלום אדם יקר שוחר שלום, האם אתה פרסי או ישראלי?", per: "אני פרסי", isr: "אני ישראלי", msgPer: "מדהים! הישראלים איתכם במאבק לחופש ולדמוקרטיה!", msgIsr: "שלום! אנחנו הפרסים מכבדים את חברינו הישראלים כפי שכיבד כורש הגדול.", trivia: "בואו נבחן את הקשר העתיק בטריוויה!", score: "ציון השלום", input: "כתבו הודעה לשיתוף...", send: "שתף", correct: "✅ מדהים!", wrong: "❌ התשובה: ", finish: "כולנו בני אדם. שתפו את הודעת השלום שלכם עם העולם!" },
            fa: { welcome: "سلام دوست عزیز، آیا شما ایرانی هستید یا اسرائیلی؟", per: "من ایرانی هستم", isr: "من اسرائیلی هستم", msgPer: "عالی! اسرائیلی‌ها از آزادی و مبارزه شما حمایت می‌کنند.", msgIsr: "سلام! ما ایرانی‌ها احترام عمیقی برای دوستان اسرائیلی قائل هستیم.", trivia: "بیایید پیوند باستانی‌مان را بسنجیم!", score: "امتیاز صلح", input: "پیامی برای اشتراک‌گذاری بنویسید...", send: "اشتراک‌گذاری", correct: "✅ عالی بود!", wrong: "❌ جواب درست: ", finish: "ما همه یک بشریت هستیم. پیام صلح خود را با جهان به اشتراک بگذارید!" }
        };

        const QUESTS = {
            israeli: [
                {q: "What is a Persian dish made of beef and rice as big meatballs?", o: ["Chorba", "Gondi", "Chraime"], c: 1},
                {q: "Which King allowed Jews to return to Jerusalem?", o: ["Cyrus", "Xerxes", "Darius"], c: 0},
                {q: "Where is the Purim story located?", o: ["Tehran", "Susa", "Shiraz"], c: 1},
                {q: "What is the Persian New Year called?", o: ["Yalda", "Nowruz", "Sizdah"], c: 1},
                {q: "Which city houses the tomb of Esther & Mordechai?", o: ["Hamadan", "Shiraz", "Isfahan"], c: 0},
                {q: "What is 'Tadig'?", o: ["Soup", "Crispy Rice", "Tea"], c: 1},
                {q: "Iran's most famous and expensive spice?", o: ["Turmeric", "Saffron", "Sumac"], c: 1},
                {q: "Who wrote the national epic 'Shahnameh'?", o: ["Rumi", "Ferdowsi", "Hafez"], c: 1},
                {q: "The dominant religion of ancient Persia?", o: ["Zoroastrianism", "Baha'i", "Islam"], c: 0},
                {q: "The English word 'Paradise' comes from which Persian word?", o: ["Pardis", "Peyman", "Pirouz"], c: 0},
                {q: "Which city is home to the 'Pink Mosque'?", o: ["Tehran", "Shiraz", "Tabriz"], c: 1},
                {q: "A traditional musical instrument with 3 or 4 strings?", o: ["Setar", "Daf", "Ney"], c: 0},
                {q: "The primary language spoken in Iran?", o: ["Arabic", "Farsi", "Kurdish"], c: 1},
                {q: "Isfahan is famously called 'Half of the...'?", o: ["World", "Earth", "Heaven"], c: 0},
                {q: "Which fruit represents life and fertility in Persian culture?", o: ["Apple", "Pomegranate", "Date"], c: 1},
                {q: "Which poet wrote the famous 'Rubaiyat'?", o: ["Omar Khayyam", "Saadi", "Hafez"], c: 0},
                {q: "The bottom color of the Iranian flag?", o: ["Green", "White", "Red"], c: 2},
                {q: "The ancient capital of the Achaemenid Empire?", o: ["Persepolis", "Tehran", "Mashhad"], c: 0},
                {q: "What is the main square of Isfahan called?", o: ["Naqsh-e Jahan", "Azadi", "Valiasr"], c: 0},
                {q: "What are 'Kubideh' and 'Barg' types of?", o: ["Breads", "Kebabs", "Desserts"], c: 1}
            ],
            persian: [
                {q: "What does 'Shalom' mean in Hebrew?", o: ["Hello", "Peace", "Love"], c: 1},
                {q: "Which King built the First Temple in Jerusalem?", o: ["Solomon", "David", "Moses"], c: 0},
                {q: "Which city is known as the 'White City'?", o: ["Jerusalem", "Tel Aviv", "Haifa"], c: 1},
                {q: "What is the national fruit of Israel?", o: ["Orange", "Pomegranate", "Fig"], c: 0},
                {q: "Lowest point on Earth, located in Israel?", o: ["Dead Sea", "Sea of Galilee", "Red Sea"], c: 0},
                {q: "A collective community unique to Israel?", o: ["Kibbutz", "Ghetto", "Village"], c: 0},
                {q: "Jewish holiday celebrating the oil miracle?", o: ["Hanukkah", "Passover", "Sukkot"], c: 0},
                {q: "The first female Prime Minister of Israel?", o: ["Golda Meir", "Tzipi Livni", "Sara Netanyahu"], c: 0},
                {q: "The famous fortress overlooking the Dead Sea?", o: ["Masada", "Nimrod", "Akko"], c: 0},
                {q: "Traditional Jewish Sabbath bread?", o: ["Challah", "Matzah", "Pita"], c: 0},
                {q: "What is the currency of Israel?", o: ["Shekel", "Dinar", "Rial"], c: 0},
                {q: "Israel's national anthem 'Hatikvah' means...?", o: ["The Hope", "The Land", "The Peace"], c: 0},
                {q: "The seven-branched candelabra is called...?", o: ["Menorah", "Mezuzah", "Shofar"], c: 0},
                {q: "What are Falafel and Hummus primarily made of?", o: ["Chickpeas", "Meat", "Rice"], c: 0},
                {q: "Ancient language revived for modern use?", o: ["Hebrew", "Aramaic", "Yiddish"], c: 0},
                {q: "Where was King David's capital?", o: ["Jerusalem", "Hebron", "Jaffa"], c: 0},
                {q: "In Hebrew, what does 'L'chaim' mean?", o: ["To Life", "To Peace", "To Joy"], c: 0},
                {q: "Which sea borders Israel to the West?", o: ["Mediterranean", "Red Sea", "Dead Sea"], c: 0},
                {q: "Jerusalem is holy to how many major religions?", o: ["3", "2", "1"], c: 0},
                {q: "Israeli high-tech sector nickname?", o: ["Silicon Wadi", "Silicon Hills", "Tech Hub"], c: 0}
            ]
        };

        let st = { l: 'en', type: null, idx: 0, sc: 0, set: [] };

        window.setLang = (l) => { st.l = l; document.body.classList.toggle('rtl', l !== 'en'); renderWelcome(); };

        window.toggleRadio = (t) => {
            const pIl = document.getElementById('player-il');
            const pIr = document.getElementById('player-ir');
            const bIl = document.getElementById('rad-il');
            const bIr = document.getElementById('rad-ir');
            pIl.pause(); pIr.pause();
            bIl.classList.remove('radio-btn-active'); bIr.classList.remove('radio-btn-active');
            if (t === 'il') { pIl.play(); bIl.classList.add('radio-btn-active'); }
            if (t === 'ir') { pIr.play(); bIr.classList.add('radio-btn-active'); }
        };

        function addMsg(txt, isUser = false) {
            const area = document.getElementById('chat-feed');
            const d = document.createElement('div');
            d.className = `max-w-[85%] p-4 rounded-3xl mb-2 fade-in text-sm ${isUser ? 'bg-blue-600 self-end rounded-tr-none' : 'bg-white/10 self-start rounded-tl-none border border-white/5'}`;
            d.innerText = txt;
            area.appendChild(d);
            area.scrollTop = area.scrollHeight;
        }

        async function genAI(p) {
            document.getElementById('ai-loader').classList.remove('hidden');
            try {
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${GEMINI_API_KEY}`, {
                    method: 'POST', body: JSON.stringify({instances:{prompt: `Cinematic artistic scene of ${p}, peaceful, sunny, heartwarming culture.`}, parameters:{sampleCount:1}})
                });
                const d = await r.json();
                if(d.predictions?.[0]?.bytesBase64Encoded) {
                    const i = document.createElement('img');
                    i.src = `data:image/png;base64,${d.predictions[0].bytesBase64Encoded}`;
                    i.className = "w-full rounded-2xl my-2 border border-white/10 shadow-xl fade-in";
                    document.getElementById('chat-feed').appendChild(i);
                    document.getElementById('chat-feed').scrollTop = document.getElementById('chat-feed').scrollHeight;
                }
            } catch(e){}
            document.getElementById('ai-loader').classList.add('hidden');
        }

        function renderWelcome() {
            const area = document.getElementById('chat-feed'); area.innerHTML = '';
            addMsg(i18n[st.l].welcome);
            document.getElementById('footer-box').innerHTML = `<div class="flex gap-2">
                <button onclick="pick('persian')" class="flex-1 bg-teal-600 p-4 rounded-2xl font-bold text-xs shadow-lg active:scale-95 transition">I am Persian</button>
                <button onclick="pick('israeli')" class="flex-1 bg-blue-600 p-4 rounded-2xl font-bold text-xs shadow-lg active:scale-95 transition">I am Israeli</button>
            </div>`;
        }

        window.pick = async (type) => {
            st.type = type;
            addMsg(i18n[st.l][type === 'persian' ? 'per' : 'isr'], true);
            await genAI(type === 'israeli' ? 'The Old City of Jerusalem at Sunset' : 'The Beautiful Tomb of Cyrus in Shiraz');
            addMsg(type === 'persian' ? i18n[st.l].msgPer : i18n[st.l].msgIsr);
            document.getElementById('footer-box').innerHTML = `<button onclick="start()" class="w-full bg-white text-black p-4 rounded-2xl font-bold text-xs shadow-lg active:scale-95 transition">${i18n[st.l].trivia}</button>`;
        };

        window.start = () => {
            st.idx = 0; st.sc = 0; 
            st.set = [...QUESTS[st.type]].sort(()=>0.5-Math.random()).slice(0,5);
            renderStep();
        };

        function renderStep() {
            const q = st.set[st.idx];
            addMsg(`Q: ${q.q}`);
            document.getElementById('footer-box').innerHTML = `<div class="grid grid-cols-2 gap-2">
                ${q.o.map((o,i)=>`<button onclick="solve(${i})" class="bg-white/10 p-3 rounded-xl text-[11px] hover:bg-white/20 active:bg-blue-600 transition-colors">${o}</button>`).join('')}
            </div>`;
        }

        window.solve = (i) => {
            const q = st.set[st.idx]; const ok = i === q.c; if(ok) st.sc++;
            addMsg(ok ? i18n[st.l].correct : i18n[st.l].wrong + q.o[q.c]);
            st.idx++;
            if(st.idx < 5) setTimeout(renderStep, 900); else finish();
        };

        function finish() {
            addMsg(`${i18n[st.l].score}: ${st.sc}/5`);
            addMsg(i18n[st.l].finish);
            genAI("Israeli and Persian families sharing a peaceful meal together in a sunny garden");
            document.getElementById('footer-box').innerHTML = `
                <div class="flex flex-col gap-2">
                    <input id="final-msg" type="text" placeholder="${i18n[st.l].input}" class="bg-white/10 p-4 rounded-xl border-0 text-sm focus:ring-0">
                    <button onclick="shareSocial()" class="bg-blue-600 p-4 rounded-xl font-bold text-xs">${i18n[st.l].send}</button>
                </div>
            `;
            lucide.createIcons();
        }

        window.shareSocial = () => {
            const txt = document.getElementById('final-msg').value;
            if(!txt) return;
            const fullTxt = `🕊️ Bridge of Peace: ${txt}\n#IsraelIranPeace #HumanityFirst`;
            // Attempt standard share
            if (navigator.share) {
                navigator.share({ title: 'Bridges of Peace', text: fullTxt }).catch(()=>{});
            } else {
                // Fallback: Copy to clipboard
                const el = document.createElement('textarea');
                el.value = fullTxt;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                alert("Copied to clipboard! Share it on social media.");
            }
        };

        window.onload = () => { renderWelcome(); lucide.createIcons(); };
    </script>
</body>
</html>
